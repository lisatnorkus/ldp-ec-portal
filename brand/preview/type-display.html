<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;}
  body.ldp{padding:0;background:var(--color-ldp-navy-900);font-family:var(--font-sans);min-height:280px;position:relative;overflow:hidden;}
  body::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent 0,transparent 6px,rgba(255,255,255,0.06) 6px,rgba(255,255,255,0.06) 7px);pointer-events:none;}
  .wrap{position:relative;z-index:1;padding:32px 36px;}
  .label{font-family:var(--font-sans);font-size:11px;letter-spacing:0.25em;text-transform:uppercase;font-weight:600;color:var(--color-ldp-red-bright);margin-bottom:18px;}
  .display{font-family:var(--font-sans);font-weight:900;font-size:64px;line-height:0.95;letter-spacing:-0.035em;color:#fff;margin:0;}
  .display .grad{background:linear-gradient(90deg,var(--color-ldp-gold) 0%,#fff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .meta{margin-top:18px;font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:0.04em;}
  .meta strong{color:rgba(255,255,255,0.9);font-weight:600;}
</style></head><body class="ldp">
<div class="wrap">
  <div class="label">Display — Inter 900</div>
  <h1 class="display">The internal<br><span class="grad">playbook.</span></h1>
  <div class="meta"><strong>family</strong> Inter · 900 &nbsp;·&nbsp; <strong>72px</strong> · line-height 0.95 &nbsp;·&nbsp; <strong>tracking</strong> −0.035em &nbsp;·&nbsp; <strong>gradient</strong> #60a5fa → #fff</div>
</div>
</body></html>
